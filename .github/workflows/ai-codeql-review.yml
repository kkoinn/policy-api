name: AI - CodeQL Review

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions:
  pull-requests: write
  contents: read
  actions: read

jobs:
  analyze:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.event == 'pull_request' }}

    steps:
      - name: Download CodeQL SARIF artifact
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_ID: ${{ github.event.workflow_run.id }}
        shell: bash
        run: |
          ARTIFACT_ID=$(gh api repos/${{ github.repository }}/actions/runs/$RUN_ID/artifacts \
            --jq '.artifacts[] | select(.name=="codeql-sarif") | .id')

          if [ -z "$ARTIFACT_ID" ]; then
            echo "No codeql-sarif artifact found"
            exit 0
          fi

          gh api repos/${{ github.repository }}/actions/artifacts/$ARTIFACT_ID/zip > codeql.zip
          unzip -o codeql.zip -d codeql-results/

      - name: Extract SARIF findings
        shell: bash
        run: |
          find ./codeql-results -name "*.sarif" -exec cat {} \; 2>/dev/null | head -c 12000 > findings.json
          if [ ! -s findings.json ]; then
            echo '{"runs":[]}' > findings.json
          fi

      - name: Analyze with Azure OpenAI
        shell: pwsh
        env:
          ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
          KEY: ${{ secrets.AZURE_OPENAI_KEY }}
        run: |
          $content = Get-Content findings.json -Raw
          $prompt = @"
You are a C# security analyst. Analyze these CodeQL SARIF findings and explain:
- Which findings are real risks vs likely false positives
- The severity and impact of each real issue
- Specific C# code fixes for each real issue

SARIF findings:
$content
"@
          $body = @{
            messages = @(@{ role = "user"; content = $prompt })
            max_tokens = 1500
            temperature = 0.3
          } | ConvertTo-Json -Depth 10

          $response = Invoke-RestMethod "$env:ENDPOINT/openai/deployments/gpt-4/chat/completions?api-version=2024-02-15-preview" `
            -Method POST `
            -Headers @{ "api-key" = $env:KEY } `
            -Body $body `
            -ContentType "application/json"

          $response.choices[0].message.content | Out-File -FilePath analysis.md -Encoding utf8

      - name: Comment on PR
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER=$(gh api repos/${{ github.repository }}/actions/runs/${{ github.event.workflow_run.id }} \
            --jq '.pull_requests[0].number')

          if [ -z "$PR_NUMBER" ] || [ "$PR_NUMBER" = "null" ]; then
            echo "No associated PR found, skipping comment."
            exit 0
          fi

          BODY=$(cat analysis.md)
          gh pr comment "$PR_NUMBER" --repo ${{ github.repository }} --body "## 🛡️ AI CodeQL Security Review

$BODY"

name: CI

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

env:
  DOTNET_VERSION: "10.0.x"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: csharp
          queries: security-and-quality

      - name: Build for CodeQL
        run: dotnet build PolicyApi.slnx --configuration Release

      - name: Perform CodeQL Analysis
        id: codeql
        uses: github/codeql-action/analyze@v3
        with:
          category: /language:csharp
          output: codeql-results

      - name: Upload CodeQL SARIF
        uses: actions/upload-artifact@v4
        with:
          name: codeql-sarif
          path: codeql-results

  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Install GitVersion
        uses: gittools/actions/gitversion/setup@v3
        with:
          versionSpec: '6.x'

      - name: Determine Version
        id: gitversion
        uses: gittools/actions/gitversion/execute@v3

      - name: Restore
        run: dotnet restore PolicyApi.slnx

      - name: Build
        run: dotnet build PolicyApi.slnx --configuration Release --no-restore /p:Version=${{ steps.gitversion.outputs.semVer }}

      - name: Unit Tests
        run: dotnet test tests/PolicyApi.UnitTests/PolicyApi.UnitTests.csproj --configuration Release --no-build --collect:"XPlat Code Coverage" --logger "trx;LogFileName=unit-test-results.xml" --results-directory ./test-results

      - name: Integration Tests
        run: dotnet test tests/PolicyApi.IntegrationTests/PolicyApi.IntegrationTests.csproj --configuration Release --no-build --collect:"XPlat Code Coverage" --logger "trx;LogFileName=integration-test-results.xml" --results-directory ./test-results

      - name: Publish Test Results
        uses: dorny/test-reporter@v3.0.0
        if: always()
        with:
          name:          Test Results
          path:          ./test-results/*.xml
          reporter:      dotnet-trx
          fail-on-error: true

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name:           test-results
          path: |
            ./test-results
            **/coverage.cobertura.xml
          retention-days: 7

name: AI - Test Failure Analysis

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions:
  pull-requests: write
  contents: read
  actions: read

jobs:
  analyze:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.event == 'pull_request' && github.event.workflow_run.conclusion != 'success' }}

    steps:
      - name: Download test results artifact
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_ID: ${{ github.event.workflow_run.id }}
        shell: bash
        run: |
          gh api repos/${{ github.repository }}/actions/runs/$RUN_ID/artifacts \
            --jq '.artifacts[] | select(.name=="test-results") | .id' > artifact_id.txt

          ARTIFACT_ID=$(cat artifact_id.txt)
          if [ -z "$ARTIFACT_ID" ]; then
            echo "No test-results artifact found"
            exit 0
          fi

          gh api repos/${{ github.repository }}/actions/artifacts/$ARTIFACT_ID/zip > test-results.zip
          unzip -o test-results.zip -d test-results/

      - name: Extract test output
        shell: bash
        run: |
          find ./test-results -name "*.xml" -exec cat {} \; 2>/dev/null | head -c 12000 > input.xml
          if [ ! -s input.xml ]; then
            echo "No test XML files found" > input.xml
          fi

      - name: Analyze with Azure OpenAI
        id: analyze
        shell: pwsh
        env:
          ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
          KEY: ${{ secrets.AZURE_OPENAI_KEY }}
        run: |
          $content = Get-Content input.xml -Raw
          $prompt = @"
You are a .NET test analyst. Analyze these test results and explain:
- Which tests are failing
- The likely root cause of each failure
- Suggested fixes

Test results:
$content
"@
          $body = @{
            messages = @(@{ role = "user"; content = $prompt })
            max_tokens = 1500
            temperature = 0.3
          } | ConvertTo-Json -Depth 10

          $response = Invoke-RestMethod "$env:ENDPOINT/openai/deployments/gpt-4/chat/completions?api-version=2024-02-15-preview" `
            -Method POST `
            -Headers @{ "api-key" = $env:KEY } `
            -Body $body `
            -ContentType "application/json"

          $analysis = $response.choices[0].message.content
          $analysis | Out-File -FilePath analysis.md -Encoding utf8
          Write-Output "Analysis saved."

      - name: Comment on PR
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER=$(gh api repos/${{ github.repository }}/actions/runs/${{ github.event.workflow_run.id }} \
            --jq '.pull_requests[0].number')

          if [ -z "$PR_NUMBER" ] || [ "$PR_NUMBER" = "null" ]; then
            echo "No associated PR found, skipping comment."
            exit 0
          fi

          BODY=$(cat analysis.md)
          gh pr comment "$PR_NUMBER" --repo ${{ github.repository }} --body "## 🤖 AI Test Failure Analysis

$BODY"

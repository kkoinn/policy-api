name: CD

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

env:
  REGISTRY:   ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:

  build-and-push:
    name: Docker Build & Push
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    outputs:
      image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ github.ref_name }}
            type=sha,prefix=sha-

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build & Push
        uses: docker/build-push-action@v7
        with:
          context:    .
          file:       src/PolicyApi/Dockerfile
          push:       true
          tags:       ${{ steps.meta.outputs.tags }}
          labels:     ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

  deploy:
    name: Deploy to Azure
    runs-on: ubuntu-latest
    needs: build-and-push

    permissions:
      id-token: write
      contents: read

    environment:
      name: test
      url:  ${{ steps.bicep.outputs.appUrl }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy Bicep
        id: bicep
        uses: azure/bicep-deploy@v2
        with:
          name:            policy-api-${{ github.ref_name }}
          type:            deployment
          operation:       create
          scope:           subscription
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          location:        westeurope
          template-file:   infrastructure/bicep/main.bicep
          parameters-file: infrastructure/bicep/main.bicepparam
          parameters: >
            containerImage=ghcr.io/${{ env.IMAGE_NAME }}:${{ github.ref_name }}
            serviceBusConnectionString=${{ secrets.SERVICEBUS_CONNECTION_STRING }}
            guidewireBaseUrl=${{ secrets.GUIDEWIRE_BASE_URL }}
            registryUsername=${{ github.actor }}
            registryPassword=${{ secrets.GHCR_PAT }}
            revisionSuffix=${{ github.run_id }}

      - name: Verify Deployment
        run: |
          echo "App deployed to: ${{ steps.bicep.outputs.appUrl }}"
          curl --fail --silent --retry 5 --retry-delay 10 "${{ steps.bicep.outputs.appUrl }}/health" || echo "Health check failed"
